name: Atlas CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

  extension-validation:
    name: Extension Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Compile extension
        working-directory: extension
        run: npm run compile

  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pytest httpx

      - name: Run backend tests
        env:
          ATLAS_SKIP_DB_INIT: "true"
          PYTHONPATH: backend
        run: python -m pytest backend/tests

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs:
      - frontend-validation
      - backend-validation

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        run: docker build --file frontend/Dockerfile --tag atlas-frontend:ci .

      - name: Build backend Docker image
        run: docker build --file backend/Dockerfile --tag atlas-backend:ci .

  helm-validation:
    name: Helm Validation
    runs-on: ubuntu-latest
    needs:
      - docker-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run helm lint
        run: helm lint helm/atlas

      - name: Render Helm chart
        run: helm template atlas helm/atlas

  kubernetes-manifest-validation:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest
    needs:
      - helm-validation

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=v0.6.7
          curl -sSL -o kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Render Kubernetes manifests
        run: helm template atlas helm/atlas > rendered-manifests.yaml

      - name: Validate rendered manifests
        run: kubeconform -strict -summary -ignore-missing-schemas rendered-manifests.yaml
