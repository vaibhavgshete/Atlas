apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atlas-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: atlas-backend
                port:
                  number: 8000

          - path: /
            pathType: Prefix
            backend:
              service:
                name: atlas-frontend
                port:
                  number: 80
